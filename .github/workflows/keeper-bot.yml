name: Keeper Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # Her 5 dakikada bir çalışır
  workflow_dispatch:          # Manuel tetikleme de mümkün

jobs:
  run-keeper:
    runs-on: ubuntu-latest
    steps:
      - name: Keeper Bot — 10 saniyede bir, 5 dakika boyunca
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST \
              "https://nova-shield-backend.vercel.app/api/cron/keeper" \
              -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
              -H "Content-Type: application/json" \
              --max-time 8
            sleep 10
          done
